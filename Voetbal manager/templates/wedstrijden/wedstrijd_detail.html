<!DOCTYPE html>
<html>
<head>
    <title>Wedstrijd</title>
</head>
<body>

<h2>{% if wedstrijd %}Wedstrijd bewerken{% else %}Nieuwe wedstrijd{% endif %}</h2>

<form method="POST">
    <label>Tegenstander:</label>
    <input type="text" name="tegenstander" value="{{ wedstrijd.tegenstander if wedstrijd }}" required>

    <label>Datum:</label>
    <input type="date" name="datum" value="{{ wedstrijd.datum if wedstrijd }}" required>

    <label>Tijd:</label>
    <input type="time" name="tijd" value="{{ wedstrijd.tijd if wedstrijd }}" required>

    <label>Locatie:</label>
    <input type="text" name="locatie" value="{{ wedstrijd.locatie if wedstrijd }}">

    <label>Thuis / Uit:</label>
    <input type="text" name="thuis_uit" value="{{ wedstrijd.thuis_uit if wedstrijd }}">

    <label>Resultaat:</label>
    <input type="text" name="resultaat" value="{{ wedstrijd.resultaat if wedstrijd }}">

    <button type="submit">Opslaan</button>
</form>

<a href="{{ url_for('wedstrijden_list') }}">Annuleren</a>

</body>
</html>
