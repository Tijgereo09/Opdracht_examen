<!DOCTYPE html>
<html>
<head>
    <title>Registreren</title>
</head>
<body>
<h2>Account aanmaken</h2>

{# Laat eventuele foutmeldingen zien tijdens registratie. #}
{% with messages = get_flashed_messages(with_categories=true) %}
  {% for category, msg in messages %}
    <p style="color:red">{{ msg }}</p>
  {% endfor %}
{% endwith %}

<form method="POST">
    <label>Gebruikersnaam:</label>
    <input type="text" name="username" required>

    <label>Wachtwoord:</label>
    <input type="password" name="password" required>

    <label>Positie:</label>
    <input type="text" name="positie">

    <label>Rugnummer:</label>
    <input type="number" name="rugnummer" min="1" max="99" required>

    <label>Team:</label>
    <input type="text" name="team">

    <button type="submit">Registreren</button>
</form>

<p>Al een account? <a href="{{ url_for('auth.login') }}">Log in</a></p>
</body>
</html>
