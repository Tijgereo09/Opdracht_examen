{% extends 'basis/base.html' %}

{% block title %}Registreren{% endblock %}

{% block content %}
<div class="panel card">
    <h2>Registreren</h2>

    <form method="POST">
        <label class="form-label">Gebruikersnaam</label>
        <input class="form-control" type="text" name="username" value="{{ username or '' }}" required>

        <label class="form-label" style="margin-top:12px">Wachtwoord</label>
        <input class="form-control" type="password" name="password" required>

        <label class="form-label" style="margin-top:12px">Positie</label>
        <select class="form-control" name="positie">
            <option value="">- Kies positie -</option>
            <option value="keeper" {% if positie=='keeper' %}selected{% endif %}>Keeper</option>
            <option value="verdediger" {% if positie=='verdediger' %}selected{% endif %}>Verdediger</option>
            <option value="middenvelder" {% if positie=='middenvelder' %}selected{% endif %}>Middenvelder</option>
            <option value="aanvaller" {% if positie=='aanvaller' %}selected{% endif %}>Aanvaller</option>
        </select>

        <label class="form-label" style="margin-top:12px">Rugnummer</label>
        <input class="form-control" type="text" name="rugnummer" value="{{ rugnummer or '' }}" required>

        <label class="form-label" style="margin-top:12px">Team</label>
        <input class="form-control" type="text" name="team" value="{{ team or '' }}">

        <div style="margin-top:16px; display:flex; justify-content:flex-end; gap:8px">
            <a class="btn btn-ghost" href="{{ url_for('auth.login') }}">Annuleren</a>
            <button class="btn btn-primary" type="submit">Registreren</button>
        </div>
    </form>
</div>
{% endblock %}
