{% extends 'basis/base.html' %}

{% block title %}Admin - Voetbal manager{% endblock %}

{% block content %}
<div class="container">
  <div class="panel card">
    <h2>Trainer Dashboard (ADMIN)</h2>

    <h3>Alle gebruikers</h3>
    <table class="table">
      <thead>
        <tr><th>Naam</th><th>Rol</th></tr>
      </thead>
      <tbody>
        {% for u in users %}
        <tr>
          <td>{{ u[0] }}</td>
          <td>{{ u[1] }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>

    <div style="margin-top:12px">
      <a class="btn btn-danger" href="/logout">Logout</a>
    </div>
  </div>
</div>
{% endblock %}
