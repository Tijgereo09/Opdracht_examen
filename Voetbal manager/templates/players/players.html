<!DOCTYPE html>
<html>
<head>
    <title>Spelers</title>
</head>
<body>

<h2>Spelerslijst</h2>

<a href="{{ url_for('players_add') }}">Nieuwe speler toevoegen</a><br><br>

<table border="1">
    <tr>
        <th>Naam</th>
        <th>Positie</th>
        <th>Rugnummer</th>
        <th>Team</th>
        <th>Acties</th>
    </tr>

    {% for s in spelers %}
    <tr>
        <td>{{ s.username }}</td>
        <td>{{ s.positie }}</td>
        <td>{{ s.rugnummer }}</td>
        <td>{{ s.team }}</td>
        <td>
            <a href="{{ url_for('players_edit', speler_id=s.id) }}">Bewerken</a> |
            <a href="{{ url_for('players_delete', speler_id=s.id) }}">Verwijderen</a>
        </td>
    </tr>
    {% endfor %}
</table>

<br>
<a href="{{ url_for('dashboard') }}">Terug</a>

</body>
</html>
