{% extends 'basis/base.html' %}

{% block title %}Nieuwe speler - Voetbal manager{% endblock %}

{% block content %}
{# Formulierpagina voor het toevoegen van een nieuwe speler. #}
<div class="panel card">
    <h2>Nieuwe speler toevoegen</h2>

    <form method="POST">
        <div class="form-row">
            <div style="flex:1">
                <label class="form-label">Gebruikersnaam</label>
                <input class="form-control" type="text" name="username" required>
            </div>
            <div style="flex:1">
                <label class="form-label">Wachtwoord</label>
                <input class="form-control" type="password" name="password" required>
            </div>
        </div>

        <div class="form-row" style="margin-top:12px">
            <div style="flex:1">
                <label class="form-label">Positie</label>
                <select class="form-control" name="positie">
                    <option value="">- Kies -</option>
                    <option value="keeper">Keeper</option>
                    <option value="verdediger">Verdediger</option>
                    <option value="middenvelder">Middenvelder</option>
                    <option value="aanvaller">Aanvaller</option>
                </select>
            </div>
            <div style="width:140px">
                <label class="form-label">Rugnummer</label>
                <input class="form-control" type="number" name="rugnummer" min="1" max="99" required>
            </div>
        </div>

        <div style="margin-top:12px">
            <label class="form-label">Team</label>
            <input class="form-control" type="text" name="team">
        </div>

        <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end">
            <a class="btn btn-ghost" href="{{ url_for('players.players_list') }}">Annuleren</a>
            <button class="btn btn-primary" type="submit">Opslaan</button>
        </div>
    </form>
</div>
{% endblock %}
