{% extends "basis/base.html" %}
{% block title %}Speler toevoegen{% endblock %}

{% block content %}
<h2>Nieuwe speler toevoegen</h2>

<form method="post">
    <label>Gebruikersnaam:
        <input type="text" name="username">
    </label><br>
    <label>Wachtwoord:
        <input type="password" name="password">
    </label><br>
    <label>Positie:
        <input type="text" name="positie">
    </label><br>
    <label>Rugnummer:
        <input type="text" name="rugnummer">
    </label><br>
    <label>Team:
        <input type="text" name="team">
    </label><br>
    <button type="submit">Opslaan</button>
</form>

<p><a href="{{ url_for('players_list') }}">Terug naar spelers</a></p>
{% endblock %}
