<!DOCTYPE html>
<html>
<head>
    <title>Speler toevoegen</title>
</head>
<body>

<h2>Nieuwe speler toevoegen</h2>

{# Formulier voor het toevoegen van een nieuwe speler door de trainer. #}
<form method="POST">
    <label>Gebruikersnaam:</label>
    <input type="text" name="username" required>

    <label>Wachtwoord:</label>
    <input type="password" name="password" required>

    <label>Positie:</label>
    <input type="text" name="positie">

    <label>Rugnummer:</label>
    <input type="number" name="rugnummer" min="1" max="99" required>

    <label>Team:</label>
    <input type="text" name="team">

    <button type="submit">Opslaan</button>
</form>

<a href="{{ url_for('players.players_list') }}">Annuleren</a>

</body>
</html>
