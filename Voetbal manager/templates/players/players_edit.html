{% extends 'basis/base.html' %}

{% block title %}Speler bewerken - Voetbal manager{% endblock %}

{% block content %}
{# Formulierpagina voor het bewerken van spelergegevens. #}
<div class="panel card">
    <h2>Speler bewerken</h2>

    <form method="POST">
        <label class="form-label">Gebruikersnaam</label>
        <input class="form-control" type="text" name="username" value="{{ speler.username }}" required>

        <div class="form-row" style="margin-top:12px">
            <div style="flex:1">
                <label class="form-label">Positie</label>
                <select class="form-control" name="positie">
                    <option value="">- Kies -</option>
                    <option value="keeper" {% if speler and speler.positie == 'keeper' %}selected{% endif %}>Keeper</option>
                    <option value="verdediger" {% if speler and speler.positie == 'verdediger' %}selected{% endif %}>Verdediger</option>
                    <option value="middenvelder" {% if speler and speler.positie == 'middenvelder' %}selected{% endif %}>Middenvelder</option>
                    <option value="aanvaller" {% if speler and speler.positie == 'aanvaller' %}selected{% endif %}>Aanvaller</option>
                </select>
            </div>
            <div style="width:140px">
                <label class="form-label">Rugnummer</label>
                <input class="form-control" type="number" name="rugnummer" min="1" max="99" value="{{ speler.rugnummer }}" required>
            </div>
        </div>

        <div style="margin-top:12px">
            <label class="form-label">Team</label>
            <input class="form-control" type="text" name="team" value="{{ speler.team }}">
        </div>

        <div style="margin-top:16px;display:flex;gap:8px;justify-content:flex-end">
            <a class="btn btn-ghost" href="{{ url_for('players.players_list') }}">Annuleren</a>
            <button class="btn btn-primary" type="submit">Opslaan</button>
        </div>
    </form>
</div>
{% endblock %}
