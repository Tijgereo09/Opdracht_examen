<!DOCTYPE html>
<html>
<head>
    <title>Speler bewerken</title>
</head>
<body>

<h2>Speler bewerken</h2>

{# Formulier om bestaande spelergegevens te bewerken. #}
<form method="POST">
    <label>Gebruikersnaam:</label>
    <input type="text" name="username" value="{{ speler.username }}" required>

    <label>Positie:</label>
    <input type="text" name="positie" value="{{ speler.positie }}">

    <label>Rugnummer:</label>
    <input type="number" name="rugnummer" min="1" max="99" value="{{ speler.rugnummer }}" required>

    <label>Team:</label>
    <input type="text" name="team" value="{{ speler.team }}">

    <button type="submit">Opslaan</button>
</form>

<a href="{{ url_for('players.players_list') }}">Annuleren</a>

</body>
</html>
