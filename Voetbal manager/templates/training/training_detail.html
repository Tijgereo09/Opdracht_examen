<!DOCTYPE html>
<html>
<head>
    <title>Training</title>
</head>
<body>

<h2>{% if training %}Training bewerken{% else %}Nieuwe training{% endif %}</h2>

{# Formulier voor het aanmaken of bijwerken van een training. #}
<form method="POST">
    <label>Titel:</label>
    <input type="text" name="titel" value="{{ training.titel if training }}" required>

    <label>Datum:</label>
    <input type="date" name="datum" value="{{ training.datum if training }}" required>

    <label>Tijd:</label>
    <input type="time" name="tijd" value="{{ training.tijd if training }}" required>

    <label>Locatie:</label>
    <input type="text" name="locatie" value="{{ training.locatie if training }}">

    <label>Beschrijving:</label>
    <textarea name="beschrijving">{{ training.beschrijving if training }}</textarea>

    <button type="submit">Opslaan</button>
</form>

<a href="{{ url_for('training.training_list') }}">Annuleren</a>

</body>
</html>
